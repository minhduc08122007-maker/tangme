<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sắp đến sinh nhật Mẹ rồi!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background-color: #fffdf5; /* Nền màu sữa nhẹ nhàng */
        }

        /* ================= MÀN HÌNH ĐẾM NGƯỢC ================= */
        #countdown-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
            position: relative;
        }

        /* KHUNG BÁNH SINH NHẬT 3 TẦNG */
        .cake-frame {
            position: relative;
            z-index: 20;
            padding-bottom: 20px;
        }

        .cake-tier-3 {
            background-color: #f8bbd0;
            border: 8px solid #d81b60;
            border-bottom: none;
            border-radius: 15px 15px 0 0;
            padding: 15px;
            width: 250px;
            margin: 0 auto;
            position: relative;
        }
        
        .cake-tier-2 {
            background-color: white;
            border: 8px solid #d81b60;
            border-bottom: none;
            width: 320px;
            margin: -5px auto 0;
            padding: 10px;
        }

        .cake-tier-1 {
            background-color: #fce4ec;
            border: 8px solid #d81b60;
            border-radius: 0 0 15px 15px;
            width: 380px;
            margin: -5px auto 0;
            padding: 25px 15px;
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.3);
        }

        .candles-group {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        .candle {
            font-size: 35px;
            animation: candleFlicker 1.5s ease-in-out infinite alternate;
        }
        @keyframes candleFlicker { from { transform: scale(1); opacity: 0.9; } to { transform: scale(1.1); opacity: 1; } }

        .countdown-title {
            color: #d81b60;
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            margin-top: -10px;
        }

        .timer-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-box span {
            background: #d81b60;
            color: white;
            font-size: 3.5rem;
            font-weight: bold;
            padding: 15px 20px;
            border-radius: 12px;
            min-width: 70px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
            text-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }

        .time-box p {
            color: #ad1457;
            margin: 10px 0 0 0;
            font-size: 1rem;
            font-weight: bold;
        }

        /* MƯA TRÁI TIM */
        #heart-rain-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.7;
        }

        .falling-heart {
            position: absolute;
            color: #ff80ab;
            font-size: 20px;
            pointer-events: none;
            animation: fallDownHeart 5s linear infinite;
        }

        @keyframes fallDownHeart {
            0% { top: -5vh; opacity: 1; }
            100% { top: 105vh; opacity: 0; }
        }

        /* ================= MÀN HÌNH CHÚC MỪNG ================= */
        #main-screen {
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 30;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 2.8rem;
            margin-bottom: 1rem;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #f8bbd0, 0 0 15px #d81b60; }
            to { text-shadow: 0 0 10px #fff, 0 0 20px #f8bbd0, 0 0 30px #d81b60; }
        }

        .photo-placeholder {
            width: 150px;
            height: 150px;
            background: #eee;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            border: 5px solid #f8bbd0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(248, 187, 208, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(248, 187, 208, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(248, 187, 208, 0); }
        }

        .photo-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .card p { color: #555; line-height: 1.6; font-size: 1.1rem; }

        .btn {
            background: #d81b60;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.4);
        }
        .btn:hover { background: #ad1457; transform: scale(1.05); }

        #hidden-message {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #fff3e0;
            border-radius: 10px;
            border-left: 5px solid #ffb300;
            font-style: italic;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .heart, .balloon { position: absolute; z-index: 1; opacity: 0; }
        .heart { font-size: 25px; animation: flyUpHeart 3s linear infinite; }
        .balloon { animation: flyUpBalloon 5s linear forwards; }

        @keyframes flyUpHeart {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }
        @keyframes flyUpBalloon {
            0% { transform: translateY(100vh) rotate(-10deg); opacity: 1; }
            50% { transform: translateY(30vh) rotate(10deg); }
            100% { transform: translateY(-20vh) rotate(-10deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="nhac-me.mp3"></audio>

    <div id="countdown-screen">
        <div id="heart-rain-container"></div>
        
        <div class="cake-frame">
            <div class="cake-tier-3">
                <div class="candles-group">
                    <span class="candle">🕯️</span>
                    <span class="candle">🕯️</span>
                    <span class="candle">🕯️</span>
                </div>
            </div>

            <div class="cake-tier-2">
                <div class="countdown-title">ĐẾM NGƯỢC<br>SINH NHẬT MẸ</div>
            </div>

            <div class="cake-tier-1">
                <div class="timer-container">
                    <div class="time-box">
                        <span id="days">00</span>
                        <p>NGÀY</p>
                    </div>
                    <div class="time-box">
                        <span id="hours">00</span>
                        <p>GIỜ</p>
                    </div>
                    <div class="time-box">
                        <span id="minutes">00</span>
                        <p>PHÚT</p>
                    </div>
                    <div class="time-box">
                        <span id="seconds">00</span>
                        <p>GIÂY</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="main-screen">
        <div class="card">
            <div class="photo-placeholder">
                <img src="z7744906306701_981450dd155a24cb1dc941f4c3649e4c.jpg">
            </div>
            <h1>Chúc Mừng Sinh Nhật MẸ!</h1>
            <p>Chúc người phụ nữ tuyệt vời nhất đời con luôn mạnh khỏe, vui vẻ và hạnh phúc bên gia đình mình mẹ nhé!</p>
            
            <button class="btn" onclick="showMessage()">Nhấn vào đây mẹ nhé ❤️</button>

            <div id="hidden-message">
                Con cảm ơn mẹ vì tất cả những hy sinh và tình yêu thương mẹ dành cho con. Con yêu mẹ rất nhiều!
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // Thời gian đích: 12h trưa ngày 28/4/2026. 
        // ĐỂ TEST NHANH, BẠN CÓ THỂ ĐỔI THÀNH: const countDownDate = new Date().getTime() + 5000;
        const countDownDate = new Date("April 28, 2026 12:00:00").getTime();

        // Mưa trái tim
        const heartRainInterval = setInterval(createFallingHeart, 200); 

        function createFallingHeart() {
            const container = document.getElementById('heart-rain-container');
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        // Đếm ngược
        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            if (distance > 0) {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
                document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
                document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
            } 
            else {
                clearInterval(x);
                clearInterval(heartRainInterval);
                document.getElementById("countdown-screen").style.display = "none";
                document.getElementById("main-screen").style.display = "flex";
                document.body.style.background = "linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%)";
            }
        }, 1000);

        // Hiển thị lời chúc
        function showMessage() {
            var audio = document.getElementById("bg-music");
            audio.play();

            document.getElementById('hidden-message').style.display = 'block';
            document.querySelector('.btn').style.display = 'none';
            
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            for(let i=0; i<15; i++) { setTimeout(createHeartUp, i * 200); }
            for(let i=0; i<10; i++) { setTimeout(createBalloonUp, i * 300); }
        }

        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        function createHeartUp() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }

        function createBalloonUp() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.innerHTML = '🎈';
            balloon.style.fontSize = (Math.random() * 20 + 40) + 'px';
            balloon.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 5000);
        }
    </script>
</body>
</html>
