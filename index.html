<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sắp đến sinh nhật Mẹ rồi!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            /* == THAY ĐỔI 1: MÀU NỀN VÀNG SỮA NHẸ NHÀNG == */
            background-color: #fffdf5; /* Milk Color nhẹ nhàng */
        }

        /* ================= MÀN HÌNH ĐẾM NGƯỢC: CƠN MƯA TRÁI TIM & BÁNH SINH NHẬT ================= */
        #countdown-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
            position: relative;
        }

        /* == THAY ĐỔI 2: VIỀN KHUNG BIẾN THÀNH BÁNH SINH NHẬT 3 TẦNG == */
        .cake-frame {
            position: relative;
            z-index: 20; /* Trên nền và trên trái tim rơi */
            padding-bottom: 20px;
        }

        /* Tầng 3 (Tầng trên cùng chứa nến) */
        .cake-tier-3 {
            background-color: #f8bbd0; /* Màu kem hồng */
            border: 8px solid #d81b60; /* Viền hồng đậm */
            border-bottom: none;
            border-radius: 15px 15px 0 0;
            padding: 15px;
            width: 250px;
            margin: 0 auto;
            position: relative;
        }
        
        /* Tầng 2 (Tầng giữa) */
        .cake-tier-2 {
            background-color: white; /* Màu kem trắng sữa */
            border: 8px solid #d81b60; /* Viền hồng đậm */
            border-bottom: none;
            width: 320px;
            margin: -5px auto 0; /* Gối lên tầng 3 */
            padding: 10px;
        }

        /* Tầng 1 (Tầng dưới cùng chứa số đếm) */
        .cake-tier-1 {
            background-color: #fce4ec; /* Màu kem hồng nhạt */
            border: 8px solid #d81b60; /* Viền hồng đậm */
            border-radius: 0 0 15px 15px;
            width: 380px;
            margin: -5px auto 0; /* Gối lên tầng 2 */
            padding: 25px 15px;
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.3);
        }

        /* Nến trang trí trên tầng 3 */
        .candles-group {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        .candle {
            font-size: 35px;
            animation: candleFlicker 1.5s ease-in-out infinite alternate;
        }
        @keyframes candleFlicker { from { transform: scale(1); opacity: 0.9; } to { transform: scale(1.1); opacity: 1; } }

        .countdown-title {
            color: #d81b60; /* Màu hồng đậm */
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            margin-top: -10px;
        }

        .timer-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-box span {
            /* == THAY ĐỔI 3: Ô SỐ ĐƯỢC CHỈNH LẠI MÀU CHO HỢP BÁNH == */
            background: #d81b60; /* Màu hồng đậm lấp đầy số */
            color: white;
            font-size: 3.5rem;
            font-weight: bold;
            padding: 15px 20px;
            border-radius: 12px;
            min-width: 70px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
            text-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }

        .time-box p {
            color: #ad1457; /* Màu chữ hồng đậm hơi tối */
            margin: 10px 0 0 0;
            font-size: 1rem;
            font-weight: bold;
        }

        /* == THAY ĐỔI 4: HIỆU ỨNG "CƠN MƯA TRÁI TIM RƠI" == */
        #heart-rain-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Không cản trở người dùng */
            z-index: 10; /* Sau chiếc bánh */
            opacity: 0.7; /* Trái tim hơi mờ */
        }

        .falling-heart {
            position: absolute;
            color: #ff80ab; /* Màu hồng tươi */
            font-size: 20px;
            pointer-events: none;
            animation: fallDownHeart 5s linear infinite;
        }

        @keyframes fallDownHeart {
            0% { top: -5vh; opacity: 1; }
            100% { top: 105vh; opacity: 0; }
        }

        /* ================= MÀN HÌNH CHÚC MỪNG (Ẩn lúc đầu) ================= */
        #main-screen {
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 2.8rem;
            margin-bottom: 1rem;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #f8bbd0, 0 0 15px #d81b60; }
            to { text-shadow: 0 0 10px #fff, 0 0 20px #f8bbd0, 0 0 30px #d81b60; }
        }

        .photo-placeholder {
            width: 150px;
            height: 150px;
            background: #eee;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            border: 5px solid #f8bbd0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(248, 187, 208, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(248, 187, 208, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(248, 187, 208, 0); }
        }

        .photo-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .card p { color: #555; line-height: 1.6; font-size: 1.1rem; }

        .btn {
            background: #d81b60;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.4);
        }
        .btn:hover { background: #ad1457; transform: scale(1.05); }

        #hidden-message {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #fff3e0;
            border-radius: 10px;
            border-left: 5px solid #ffb300;
            font-style: italic;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .heart, .balloon { position: absolute; z-index: 1; opacity: 0; }
        .heart { font-size: 25px; animation: flyUpHeart 3s linear infinite; }
        .balloon { animation: flyUpBalloon 5s linear forwards; }

        @keyframes flyUpHeart {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }
        @keyframes flyUpBalloon {
            0% { transform: translateY(100vh) rotate(-10deg); opacity: 1; }
            50% { transform: translateY(30vh) rotate(10deg); }
            100% { transform: translateY(-20vh) rotate(-10deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="nhac-me.mp3"></audio>

    <div id="countdown-screen">
        <div class="confetti-overlay"></div> <div class="decorative-item balloon-group-left">🎈</div>
        <svg class="decorative-item cake-icon" viewBox="0 0 100 100"><g fill="#f9b825"><rect x="25" y="60" width="50" height="30" rx="3"/><circle cx="50" cy="50" r="10"/></g><path d="M50 40a10 10 0 1 1 0 20v-20z" fill="#d84315"/><path d="M50 40a10 10 0 1 0 0 20V40z" fill="#fce4ec"/><ellipse cx="50" cy="60" rx="25" ry="10" fill="#f8bbd0"/><g fill="#00796b"><path d="M30 40c0-5 20-5 20 0S30 45 30 40z"/><path d="M50 40c0-5 20-5 20 0s-20 5-20 0z"/></g></svg>
        <svg class="decorative-item gift-icon" viewBox="0 0 100 100"><g fill="#00796b"><rect x="10" y="30" width="80" height="60" rx="5"/><rect x="10" y="55" width="80" height="10"/></g><g fill="#f9b825"><rect x="45" y="30" width="10" height="60"/><path d="M50 30s10-20 20-10S55 35 50 30zM50 30s-10-20-20-10 15 25 20 10z"/></g></svg>

        <div class="countdown-main-content">
            <div class="countdown-title">ĐẾM NGƯỢC<br>SINH NHẬT MẸ</div>
            
            <div class="timer-container">
                <div class="time-box">
                    <span id="days">00</span>
                    <p>NGÀY</p>
                </div>
                <div class="time-box">
                    <span id="hours">00</span>
                    <p>GIỜ</p>
                </div>
                <div class="time-box">
                    <span id="minutes">00</span>
                    <p>PHÚT</p>
                </div>
                <div class="time-box">
                    <span id="seconds">00</span>
                    <p>GIÂY</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-screen">
        <div class="card">
            <div class="photo-placeholder">
                <img src="anh-me.jpg" alt="Ảnh Mẹ Yêu">
            </div>
            <h1>Chúc Mừng Sinh Nhật Mẹ!</h1>
            <p>Chúc người phụ nữ tuyệt vời nhất đời con luôn mạnh khỏe, vui vẻ và hạnh phúc bên gia đình mình mẹ nhé!</p>
            
            <button class="btn" onclick="showMessage()">Nhấn vào đây mẹ nhé ❤️</button>

            <div id="hidden-message">
                Con cảm ơn mẹ vì tất cả những hy sinh và tình yêu thương mẹ dành cho con. Con yêu mẹ rất nhiều!
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // CÀI ĐẶT THỜI GIAN ĐÍCH: 12 giờ trưa, ngày 28 tháng 4 năm 2026
        // Thiết lập thời gian đếm ngược chỉ 5 giây tính từ lúc mở web
        const countDownDate = new Date().getTime() + 5000;

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            if (distance > 0) {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
                document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
                document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
            } 
            else {
                clearInterval(x);
                // CHUYỂN TRANG
                document.getElementById("countdown-screen").style.display = "none";
                document.getElementById("main-screen").style.display = "flex";
                document.body.style.background = "linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%)";
            }
        }, 1000);

        function showMessage() {
            var audio = document.getElementById("bg-music");
            audio.play();

            document.getElementById('hidden-message').style.display = 'block';
            document.querySelector('.btn').style.display = 'none';
            
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            for(let i=0; i<15; i++) { setTimeout(createHeart, i * 200); }
            for(let i=0; i<10; i++) { setTimeout(createBalloon, i * 300); }
        }

        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.innerHTML = '🎈';
            balloon.style.fontSize = (Math.random() * 20 + 40) + 'px';
            balloon.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 5000);
        }
    </script>
</body>
</html>
